<section id="hero"
    class="relative min-h-screen flex flex-col justify-center items-center overflow-hidden px-4 sm:px-6 py-20 sm:py-0">
    <!-- Center content -->

    <div class="text-center z-10 w-full max-w-7xl mx-auto space-y-4 sm:space-y-6 px-4">
        <div appGsapReveal [delay]="0.2"
            class="inline-block px-4 py-1.5 mb-2 sm:mb-4 rounded-full border border-[var(--border-color)] text-[var(--accent)] font-mono text-[10px] sm:text-xs tracking-[0.2em] uppercase bg-[var(--bg-secondary)]/50">
            Available for new projects
        </div>

        <h1
            class="text-4xl sm:text-6xl md:text-8xl lg:text-[10rem] font-bold tracking-tighter leading-[0.95] text-[var(--text-primary)] flex flex-col items-center justify-center text-center">
            <!-- Row 1: ANSHAD -->
            <div class="relative inline-block w-fit" appGsapReveal [delay]="0.4">
                ANS<span class="relative inline-block">H<span
                        class="absolute -top-3 sm:-top-6 left-1/2 -translate-x-1/2 w-6 h-6 sm:w-8 sm:h-8 md:w-12 md:h-12 text-[var(--accent)] animate-spin-slow">
                        <svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full">
                            <path d="M12 3l2.5 6.5l6.5 2.5l-6.5 2.5l-2.5 6.5l-2.5-6.5l-6.5-2.5l6.5-2.5z" />
                        </svg>
                    </span></span>AD
            </div>

            <!-- Row 2: MUHAMMED V -->
            <div class="relative inline-block text-[var(--text-secondary)] -mt-1 sm:-mt-2 md:-mt-4 w-fit" appGsapReveal
                [delay]="0.6">
                MUHA<span class="relative inline-block text-gradient">M<span
                        class="absolute -bottom-2 sm:-bottom-4 left-0 w-full h-1 sm:h-2 md:h-3 text-[var(--accent)] animate-wiggle">
                        <svg viewBox="0 0 100 20" preserveAspectRatio="none" fill="none" stroke="currentColor"
                            stroke-width="4">
                            <path d="M0,10 Q25,0 50,10 T100,10" />
                        </svg>
                    </span></span>MED
            </div>

            <!-- Row 3: DYNAMIC WORD -->
            <div class="relative inline-block mt-2 min-h-[1.2em] flex items-center justify-center w-full" appGsapReveal
                [delay]="0.8">
                <span class="word-transition text-gradient">
                    {{ dynamicWords()[currentWordIndex()] }}
                </span>
                <span
                    class="absolute -top-1 -right-2 sm:-top-2 sm:-right-4 w-6 h-8 sm:w-10 sm:h-16 text-[var(--accent)] animate-bounce-subtle pointer-events-none md:translate-x-full">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                    </svg>
                </span>
            </div>
        </h1>

        <h2 appGsapReveal [delay]="1.0"
            class="text-base sm:text-xl md:text-2xl font-light text-[var(--text-secondary)] mt-6 sm:mt-10 max-w-2xl mx-auto">
            Clean. Modern. Scalable.
        </h2>

        <p appGsapReveal [delay]="1.2"
            class="font-mono text-[10px] sm:text-sm md:text-base text-[var(--text-secondary)]/80 mt-2">
            .NET Core // Angular // SQL
        </p>

        <!-- Modern Subline -->
        <div class="max-w-xl mx-auto pt-6 px-4" appGsapReveal [delay]="1.4">
            <div
                class="flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-[10px] sm:text-xs font-mono text-[var(--text-secondary)]/50 uppercase tracking-[0.3em] text-center">
                <span>Scalability</span>
                <span class="w-1 h-1 rounded-full bg-[var(--border-color)] hidden sm:block"></span>
                <span>Performance</span>
                <span class="w-1 h-1 rounded-full bg-[var(--border-color)] hidden sm:block"></span>
                <span>Experience</span>
            </div>
        </div>
    </div>

    <!-- Background Animated Gradient -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
        <div
            class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-[var(--accent)]/10 rounded-full blur-[120px] animate-pulse">
        </div>
        <div
            class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-blue-500/10 rounded-full blur-[100px] animate-pulse delay-700">
        </div>
    </div>
</section>
