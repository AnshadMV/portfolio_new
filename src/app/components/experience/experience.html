<section id="experience" class="py-24 bg-[var(--bg-primary)] relative overflow-hidden">

    <!-- Subtle background label -->
    <div
        class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.025] select-none overflow-hidden">
        <p class="text-[20vw] font-black uppercase tracking-tighter whitespace-nowrap">WORK</p>
    </div>

    <div class="max-w-6xl mx-auto px-6 md:px-12 relative z-10">

        <!-- Section header -->
        <div class="mb-20" appGsapReveal>
            <p class="font-mono text-xs uppercase tracking-[0.4em] text-[var(--accent)] mb-4">Professional Journey</p>
            <h2
                class="text-4xl sm:text-5xl md:text-7xl font-black tracking-tighter text-[var(--text-primary)] leading-none">
                Experience
            </h2>
            <p class="mt-4 text-[var(--text-secondary)] font-mono text-sm">Building solutions, one commit at a time.</p>
        </div>

        <!-- Timeline -->
        <div class="relative">

            <!-- Vertical line -->
            <div class="absolute left-3 md:left-8 top-0 bottom-0 w-[1px] bg-[var(--border-color)]"></div>

            <div *ngFor="let job of jobs; let i = index" appGsapReveal [delay]="i * 0.2"
                class="relative pl-10 md:pl-24 pb-16 group">

                <!-- Timeline dot -->
                <div
                    class="timeline-dot absolute left-0 md:left-[21px] top-1.5 w-6 h-6 rounded-full border-2 border-[var(--text-secondary)] bg-[var(--bg-primary)] flex items-center justify-center group-hover:border-[var(--accent)] group-hover:scale-125 transition-all duration-300 shadow-[0_0_0_4px_var(--bg-primary)]">
                    <div
                        class="w-2 h-2 rounded-full bg-[var(--text-secondary)] group-hover:bg-[var(--accent)] transition-colors duration-300">
                    </div>
                </div>

                <!-- Card -->
                <div
                    class="experience-card bg-[var(--bg-secondary)]/60 rounded-2xl border border-[var(--border-color)] group-hover:border-[var(--accent)]/50 transition-all duration-500 backdrop-blur-sm overflow-hidden">

                    <!-- Card Top -->
                    <div class="p-6 md:p-8 pb-0">
                        <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-6">
                            <div>
                                <div class="flex items-center gap-3 mb-2">
                                    <span
                                        class="px-2.5 py-0.5 bg-[var(--accent)]/10 border border-[var(--accent)]/20 text-[var(--accent)] font-mono text-xs rounded-full">
                                        {{ job.type }}
                                    </span>
                                </div>
                                <h3
                                    class="text-2xl md:text-3xl font-black text-[var(--text-primary)] tracking-tight group-hover:text-[var(--accent)] transition-colors duration-300">
                                    {{ job.role }}
                                </h3>
                                <p class="text-[var(--text-secondary)] font-medium mt-1 text-lg">{{ job.company }}</p>
                            </div>
                            <div
                                class="shrink-0 px-4 py-2 bg-[var(--bg-primary)] border border-[var(--border-color)] rounded-full font-mono text-sm text-[var(--text-primary)] whitespace-nowrap">
                                {{ job.period }}
                            </div>
                        </div>

                        <!-- Key metric chips -->
                        <div class="flex flex-wrap gap-3 mb-6">
                            <div
                                class="metric-chip flex items-center gap-2 px-3 py-1.5 bg-[var(--accent)]/5 border border-[var(--accent)]/20 rounded-full">
                                <span
                                    class="w-1.5 h-1.5 rounded-full bg-[var(--accent)] shadow-[0_0_6px_var(--accent)]"></span>
                                <span class="font-mono text-xs text-[var(--accent)]">30+ APIs</span>
                            </div>
                            <div
                                class="metric-chip flex items-center gap-2 px-3 py-1.5 bg-[var(--accent)]/5 border border-[var(--accent)]/20 rounded-full">
                                <span
                                    class="w-1.5 h-1.5 rounded-full bg-[var(--accent)] shadow-[0_0_6px_var(--accent)]"></span>
                                <span class="font-mono text-xs text-[var(--accent)]">20–30% DB Optimization</span>
                            </div>
                            <div
                                class="metric-chip flex items-center gap-2 px-3 py-1.5 bg-[var(--accent)]/5 border border-[var(--accent)]/20 rounded-full">
                                <span
                                    class="w-1.5 h-1.5 rounded-full bg-[var(--accent)] shadow-[0_0_6px_var(--accent)]"></span>
                                <span class="font-mono text-xs text-[var(--accent)]">15+ Components</span>
                            </div>
                            <div
                                class="metric-chip flex items-center gap-2 px-3 py-1.5 bg-[var(--accent)]/5 border border-[var(--accent)]/20 rounded-full">
                                <span
                                    class="w-1.5 h-1.5 rounded-full bg-[var(--accent)] shadow-[0_0_6px_var(--accent)]"></span>
                                <span class="font-mono text-xs text-[var(--accent)]">30+ Bugs Resolved</span>
                            </div>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="mx-6 md:mx-8 h-[1px] bg-[var(--border-color)]"></div>

                    <!-- Bullet points -->
                    <div class="p-6 md:p-8">
                        <ul class="flex flex-col gap-3">
                            <li *ngFor="let bullet of job.bullets"
                                class="flex items-start gap-3 text-[var(--text-secondary)] text-sm leading-relaxed">
                                <span
                                    class="mt-2 w-1.5 h-1.5 rounded-full bg-[var(--text-secondary)]/40 group-hover:bg-[var(--accent)] transition-colors duration-500 shrink-0"></span>
                                {{ bullet }}
                            </li>
                        </ul>
                    </div>

                    <!-- Tech Tags -->
                    <div class="px-6 md:px-8 pb-6 flex flex-wrap gap-2">
                        <span *ngFor="let tag of job.tags"
                            class="px-3 py-1 text-xs font-mono border border-[var(--border-color)] rounded text-[var(--text-secondary)] group-hover:border-[var(--accent)]/40 group-hover:text-[var(--text-primary)] transition-colors duration-300">
                            #{{ tag }}
                        </span>
                    </div>

                </div>
            </div>
        </div>

    </div>
</section>
