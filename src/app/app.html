<app-navbar></app-navbar>

<main class="w-full relative overflow-x-hidden pt-[72px]">
  <app-hero></app-hero>
  <app-profile></app-profile>
  <div class="projects-spacer h-[15vh] bg-[var(--bg-primary)]"></div>
  <app-projects></app-projects>
  <app-experience></app-experience>
  <app-education></app-education>
  <app-contact></app-contact>
</main>
<app-footer></app-footer>

<!-- Scroll to Top Button (Mobile Responsive) -->
<button (click)="scrollToTop()"
  class="md:hidden fixed bottom-6 right-6 z-50 p-3 rounded-full bg-[var(--text-primary)] text-[var(--bg-primary)] shadow-lg transition-all duration-300 hover:scale-110 active:scale-95 focus:outline-none focus:ring-2 focus:ring-[var(--accent)] focus:ring-offset-2 focus:ring-offset-[var(--bg-primary)]"
  [ngClass]="showScrollToTop ? 'translate-y-0 opacity-100' : 'translate-y-12 opacity-0 pointer-events-none'"
  aria-label="Scroll to top">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
  </svg>
</button>
